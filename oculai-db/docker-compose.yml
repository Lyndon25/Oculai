version: '3.8'

services:
  oculai-db:
    image: pgvector/pgvector:pg16
    container_name: oculai-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-oculai}
      POSTGRES_USER: ${DB_USER:-oculai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-oculai_dev}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c shared_preload_libraries=vector
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-oculai} -d ${DB_NAME:-oculai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: '256mb'
    networks:
      - oculai-net

  # Incremental migration runner — runs after DB is healthy, applies only pending migrations
  oculai-migrate:
    image: python:3.11-slim
    container_name: oculai-migrate
    depends_on:
      oculai-db:
        condition: service_healthy
    environment:
      DB_HOST: oculai-db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-oculai}
      DB_PASSWORD: ${DB_PASSWORD:-oculai_dev}
      DB_NAME: ${DB_NAME:-oculai}
    volumes:
      - ./scripts:/scripts:ro
      - ./schema/migrations:/migrations:ro
    command: >
      sh -c "
        pip install -q asyncpg &&
        python /scripts/run_migrations.py
          --host $${DB_HOST}
          --port $${DB_PORT}
          --user $${DB_USER}
          --password $${DB_PASSWORD}
          --dbname $${DB_NAME}
          --migrations-dir /migrations
      "
    networks:
      - oculai-net
    restart: "no"

volumes:
  pgdata:
    driver: local

networks:
  oculai-net:
    driver: bridge
