version: '3.8'

services:
  oculai-db:
    image: pgvector/pgvector:pg16
    container_name: oculai-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-oculai}
      POSTGRES_USER: ${DB_USER:-oculai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-oculai_dev}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c shared_preload_libraries=vector
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-oculai} -d ${DB_NAME:-oculai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: '256mb'

volumes:
  pgdata:
    driver: local
