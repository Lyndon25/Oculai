appId: com.oculai.desktop
productName: Oculai
copyright: "Copyright © 2026 Oculai"
artifactName: "${productName}-${version}-${platform}-${arch}.${ext}"

directories:
  output: dist-electron
  buildResources: resources

files:
  - dist/main/**/*
  - dist/renderer/**/*
  - dist/resources/**/*
  - package.json

extraResources:
  - from: ../pi-windows-x64/
    to: pi-windows-x64/
    filter:
      - "**/*"

asar: true
compression: normal

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-Setup-${version}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Oculai

publish:
  - provider: github
    owner: Lyndon25
    repo: Oculai
    releaseType: draft
